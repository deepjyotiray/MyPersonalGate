server {
    listen 80;
    server_name api.healthymealspot.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.healthymealspot.com;

    ssl_certificate /etc/letsencrypt/live/api.healthymealspot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.healthymealspot.com/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /uploads/ {
        alias /path/to/ananta-towers/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
